<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BookFriend Ultimate</title>

<style>
:root{
  --main:#5A7CFF;
  --bg:#F6F7FB;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system;background:var(--bg);overflow:hidden;}

.screen{
  position:absolute;
  inset:0;
  opacity:0;
  transform:translateY(20px);
  transition:.4s;
  pointer-events:none;
}
.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.header{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:#fff;
  border-bottom:1px solid #eee;
}

.chat-wrap{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
}

.cmsg{margin-bottom:12px;display:flex;flex-direction:column;}
.user{align-items:flex-end;}
.bot{align-items:flex-start;}

.cbubble{
  max-width:72%;
  padding:12px;
  border-radius:16px;
}

.user .cbubble{background:var(--main);color:#fff;}
.bot .cbubble{background:#fff;border:1px solid #eee;}

.inputbar{
  position:sticky;
  bottom:0;
  display:flex;
  gap:8px;
  padding:10px;
  background:#fff;
}

.inputbar input{
  flex:1;
  height:42px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:0 10px;
}

.inputbar button{
  width:60px;
  background:var(--main);
  color:#fff;
  border:none;
  border-radius:12px;
}

.center{
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.btn{
  background:var(--main);
  color:#fff;
  padding:12px 20px;
  border-radius:12px;
}

.emotions{
  display:grid;
  grid-template-columns:repeat(2,120px);
  gap:12px;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.archive{padding:20px;overflow-y:auto;}
.record{background:#fff;padding:12px;border-radius:10px;margin-bottom:10px;}
</style>
</head>

<body>

<!-- 온보딩 -->
<div id="s0" class="screen active">
  <div class="center">
    <h2>BookFriend</h2>
    <p>생각을 정리하는 AI</p>
    <div class="btn" onclick="go('s1')">시작</div>
  </div>
</div>

<!-- 감정 -->
<div id="s1" class="screen">
  <div class="center">
    <h3>지금 기분은?</h3>
    <div class="emotions">
      <div class="card" onclick="startChat('행복')">😊 행복</div>
      <div class="card" onclick="startChat('불안')">😥 불안</div>
      <div class="card" onclick="startChat('화남')">😡 화남</div>
      <div class="card" onclick="startChat('우울')">😶 우울</div>
    </div>
  </div>
</div>

<!-- 채팅 -->
<div id="s2" class="screen">
  <div class="chat-wrap">
    <div class="header">
      <div>책친구</div>
      <div>
        <span onclick="setMode('comfort')">🤍</span>
        <span onclick="setMode('coaching')">🧠</span>
        <span onclick="goArchive()">≡</span>
      </div>
    </div>

    <div id="chat"></div>

    <div class="inputbar">
      <input id="chatInput">
      <button onclick="sendMessage()">전송</button>
    </div>
  </div>
</div>

<!-- 보관함 -->
<div id="s3" class="screen">
  <div class="header">
    <div>보관함</div>
    <div onclick="go('s2')">←</div>
  </div>
  <div id="archive" class="archive"></div>
</div>

<script>

/* 상태 */
let conversation=[];
let chatTurn=0;
let mode='comfort';

let emotionVector={anxiety:0,anger:0,sadness:0,positive:0};

/* 화면 */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* 감정 */
function analyze(text){
  if(text.includes('불안')) emotionVector.anxiety++;
  if(text.includes('화')) emotionVector.anger++;
  if(text.includes('우울')) emotionVector.sadness++;
  if(text.includes('좋')) emotionVector.positive++;
}

function dominant(){
  return Object.keys(emotionVector).reduce((a,b)=>emotionVector[a]>emotionVector[b]?a:b);
}

/* 시작 */
function startChat(e){
  go('s2');
  append(`"${e}" 상태구나. 어떤 일이 있었어?`,'bot');
}

/* 메시지 */
function append(text,type){
  const chat=document.getElementById('chat');
  const el=document.createElement('div');
  el.className='cmsg '+type;
  el.innerHTML=`<div class="cbubble">${text}</div>`;
  chat.appendChild(el);
  chat.scrollTop=chat.scrollHeight;
}

/* 전송 */
async function sendMessage(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg) return;

  append(msg,'user');
  input.value='';
  conversation.push(msg);
  analyze(msg);

  chatTurn++;

  if(chatTurn>=10){
    finish();
    return;
  }

  try{
    const res=await fetch('https://bookfriend-server.onrender.com/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });

    const data=await res.json();
    append(data.reply || '더 말해줄래?','bot');

  }catch{
    append('연결 문제 발생','bot');
  }
}

/* 종료 */
function finish(){
  const emo=dominant();

  const report=`
📊 리포트
감정: ${emo}
대화수: ${conversation.length}

오늘 너에게 필요한 건 뭐야?
`;

  append(report,'bot');
  save(report);
}

/* 저장 */
function save(report){
  const arr=JSON.parse(localStorage.getItem('bf')||'[]');
  arr.unshift({date:new Date(),report});
  localStorage.setItem('bf',JSON.stringify(arr));
}

/* 보관함 */
function goArchive(){
  const arr=JSON.parse(localStorage.getItem('bf')||'[]');
  document.getElementById('archive').innerHTML=
    arr.map(a=>`<div class="record">${a.report}</div>`).join('');
  go('s3');
}

/* 모드 */
function setMode(m){
  mode=m;
  alert(m==='comfort'?'위로모드':'코칭모드');
}

</script>

</body>
</html>
