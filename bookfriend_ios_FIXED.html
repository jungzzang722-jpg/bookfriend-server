<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책친구</title>

<style>
body{
  margin:0;
  font-family:'Pretendard', sans-serif;
  background:#EFE7DC;
}

/* ===== 온보딩 ===== */
.onboarding{
  position:fixed;
  inset:0;
  background:#5A3E2B;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.onboarding h1{
  font-size:28px;
  letter-spacing:2px;
}

.onboarding p{
  opacity:0.8;
}

.onboarding button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#D4A96A;
  color:#fff;
}

/* ===== 헤더 ===== */
.header{
  padding:16px;
  background:#7B4F2E;
  color:#fff;
  font-weight:bold;
}

/* ===== 감정 카드 ===== */
.emotions{
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.emotion-card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.emotion-card:hover{
  transform:translateY(-4px);
}

/* ===== 책 추천 ===== */
.book-list{
  padding:20px;
}

.book-card{
  background:#fff;
  padding:18px;
  margin-bottom:12px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  cursor:pointer;
}

.book-title{
  font-weight:bold;
}

.book-preview{
  font-size:13px;
  color:#777;
  margin-top:6px;
}

/* ===== 채팅 ===== */
.chat{
  height:calc(100vh - 140px);
  overflow:auto;
  padding:16px;
  padding-bottom:120px;
}

.msg{margin-bottom:10px;}
.user{text-align:right;}
.bot{text-align:left;}

.bubble{
  display:inline-block;
  padding:12px;
  border-radius:16px;
  max-width:70%;
}

.user .bubble{
  background:#D4A96A;
  color:#fff;
}

.bot .bubble{
  background:#fff;
}

/* ===== 책 문장 ===== */
.quote-card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  font-style:italic;
}

/* ===== 입력 ===== */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-left:6px;
  border:none;
  background:#7B4F2E;
  color:#fff;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="onboarding" id="onboarding">
  <h1>책친구</h1>
  <p>책의 한 문장이 당신에게 말을 건넵니다</p>
  <button onclick="startApp()">시작하기</button>
</div>

<div class="header">📖 책친구</div>

<!-- 감정 -->
<div class="emotions" id="emotionBox">
  <div class="emotion-card" onclick="selectEmotion('불안')">불안</div>
  <div class="emotion-card" onclick="selectEmotion('외로움')">외로움</div>
  <div class="emotion-card" onclick="selectEmotion('후회')">후회</div>
  <div class="emotion-card" onclick="selectEmotion('자존감')">자존감</div>
</div>

<!-- 책 추천 -->
<div class="book-list" id="bookList" style="display:none;"></div>

<!-- 채팅 -->
<div class="chat" id="chat" style="display:none;"></div>

<div class="footer">
  <input id="input" placeholder="생각을 적어보세요">
  <button onclick="send()">전송</button>
</div>

<script>

/* ===== 데이터 ===== */
const BOOKS = {
  불안:[
    {title:"데미안", text:"새는 알을 깨고 나온다."},
    {title:"어린왕자", text:"중요한 건 눈에 보이지 않아."},
    {title:"월든", text:"나는 의도적으로 살기 위해 숲으로 갔다."}
  ],
  외로움:[
    {title:"노르웨이의 숲", text:"사람은 결국 혼자야."},
    {title:"자기 앞의 생", text:"그래도 사람은 서로 필요해."}
  ],
  후회:[
    {title:"위대한 개츠비", text:"우리는 과거로 돌아가려 한다."}
  ],
  자존감:[
    {title:"데미안", text:"나는 나로 존재한다."}
  ]
};

let selectedBook = null;

/* ===== 시작 ===== */
function startApp(){
  onboarding.style.display='none';
}

/* ===== 감정 선택 ===== */
function selectEmotion(emotion){
  emotionBox.style.display='none';

  const list = BOOKS[emotion];
  const el = document.getElementById('bookList');
  el.style.display='block';

  el.innerHTML = list.map(b=>`
    <div class="book-card" onclick="chooseBook('${b.title}','${b.text}')">
      <div class="book-title">${b.title}</div>
      <div class="book-preview">${b.text}</div>
    </div>
  `).join('');
}

/* ===== 책 선택 ===== */
function chooseBook(title,text){
  selectedBook = {title,text};

  bookList.style.display='none';
  chat.style.display='block';

  chat.innerHTML += `
    <div class="quote-card">
      "${text}"<br><br><b>${title}</b>
    </div>
  `;

  bot("이 문장에서 가장 마음에 걸린 부분은 어디야?");
}

/* ===== 채팅 ===== */
function user(msg){
  chat.innerHTML += `<div class="msg user"><div class="bubble">${msg}</div></div>`;
  scroll();
}

function bot(msg){
  chat.innerHTML += `<div class="msg bot"><div class="bubble">${msg}</div></div>`;
  scroll();
}

function send(){
  const val = input.value.trim();
  if(!val) return;

  user(val);
  input.value='';

  setTimeout(()=>{
    bot("그 감정을 한 문장으로 정리해볼 수 있을까?");
  },600);
}

/* ===== 스크롤 ===== */
function scroll(){
  setTimeout(()=>{
    chat.scrollTop = chat.scrollHeight;
  },50);
}

</script>

</body>
</html>
