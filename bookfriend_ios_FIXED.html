<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>책친구 (BookFriend) - Professional Edition</title>
    <style>
        /* [1. DESIGN SYSTEM & iOS SAFE AREA] */
        :root {
            --cr: #F5EFE6; /* Cream Background */
            --bg: #D4A96A; /* Gold Accent */
            --br: #7B4F2E; /* Deep Brown */
            --dk: #3E2010; /* Dark Wood */
            --lb: #EAD8BC; /* Soft Beige */
            --white: #FFFFFF;
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* [2. RESET & BASE] */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            width: 100%; height: 100%; height: 100dvh; 
            overflow: hidden; background: var(--cr);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            color: var(--dk); line-height: 1.5;
        }

        /* [3. APP SHELL] */
        .app-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .screens { position: relative; width: 100%; height: 100%; }
        
        .screen {
            position: absolute; inset: 0; 
            display: none; flex-direction: column;
            background: var(--cr);
            transition: var(--transition);
            z-index: 10;
        }
        .screen.active { display: flex; z-index: 20; animation: screenFadeIn 0.5s ease forwards; }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [4. HEADER SYSTEM] */
        header {
            padding: calc(var(--sat) + 15px) 20px 15px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--lb);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
        .back-btn { font-size: 22px; cursor: pointer; padding: 5px; }

        /* [5. CHAT ENGINE & IOS FIX] */
        .chat-scroll-area {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            /* 핵심: 푸터 높이 + 아이폰 하단 툴바 영역만큼 패딩 확보 */
            padding-bottom: calc(var(--sab) + 90px) !important;
        }

        .message { max-width: 82%; display: flex; flex-direction: column; position: relative; }
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; }

        .bubble {
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.6;
            border-radius: 22px;
            position: relative;
            box-shadow: 0 4px 15px rgba(62, 32, 16, 0.04);
        }
        .bot .bubble { 
            background: var(--white); 
            color: var(--dk); 
            border-bottom-left-radius: 4px; 
            border: 1px solid rgba(234, 216, 188, 0.5);
        }
        .user .bubble { 
            background: var(--bg); 
            color: var(--white); 
            border-bottom-right-radius: 4px; 
        }

        .msg-info { font-size: 10px; color: var(--br); opacity: 0.4; margin-top: 5px; display: flex; gap: 5px; }
        .user .msg-info { justify-content: flex-end; }

        /* [6. INPUT SYSTEM - FIXED FOOTER] */
        .input-wrapper {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--lb);
            /* 핵심: sab 변수를 사용하여 아이폰 하단 바 위로 띄움 */
            padding: 12px 20px calc(var(--sab) + 12px);
            display: flex; gap: 10px; align-items: center;
            z-index: 1000;
        }

        .main-input {
            flex: 1;
            height: 48px;
            background: var(--cr);
            border: 1px solid var(--lb);
            border-radius: 24px;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }
        .main-input:focus { border-color: var(--bg); background: var(--white); }

        .send-btn {
            width: 48px; height: 48px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 20px;
            cursor: pointer; box-shadow: 0 4px 12px rgba(212, 169, 106, 0.3);
        }

        /* [7. TAB BAR] */
        .nav-tab {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white);
            border-top: 1px solid var(--lb);
            display: flex; height: calc(var(--sab) + 65px);
            padding-bottom: var(--sab);
            z-index: 900;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; color: var(--br);
            opacity: 0.4; transition: 0.3s;
        }
        .tab-item.active { opacity: 1; color: var(--bg); }
        .tab-icon { font-size: 22px; margin-bottom: 3px; }

        /* [8. CARD LISTS (Library & Archive)] */
        .card-container { padding: 20px; overflow-y: auto; flex: 1; }
        .book-card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex; gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(234, 216, 188, 0.3);
        }
        .book-cover { width: 80px; height: 110px; background: var(--lb); border-radius: 8px; flex-shrink: 0; }
        .book-info h3 { font-size: 17px; margin-bottom: 5px; }
        .book-info p { font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="screens">
        <div class="screen active" id="s1">
            <div style="margin: auto; text-align: center; padding: 40px;">
                <div style="font-size: 80px; margin-bottom: 20px;">📜</div>
                <h1 style="color: var(--br); font-size: 28px;">당신의 책친구</h1>
                <p style="margin-top: 15px; color: var(--dk); opacity: 0.7;">읽기만 하던 독서에서<br>대화하는 독서로의 시작</p>
                <button onclick="goTo('s2')" style="margin-top: 40px; width: 100%; height: 56px; background: var(--bg); border: none; border-radius: 28px; color: white; font-weight: 700; font-size: 16px;">시작하기</button>
            </div>
        </div>

        <div class="screen" id="s2">
            <header><h1>내 서재</h1><div style="font-size: 20px;">🔍</div></header>
            <div class="card-container">
                <div class="book-card" onclick="startReading('데미안', '헤르만 헤세')">
                    <div class="book-cover"></div>
                    <div class="book-info">
                        <h3>데미안</h3>
                        <p>헤르만 헤세</p>
                        <div style="margin-top: 15px; font-size: 12px; color: var(--bg);">마지막 대화: 2일 전</div>
                    </div>
                </div>
                <div class="book-card" onclick="startReading('어린왕자', '생텍쥐페리')">
                    <div class="book-cover"></div>
                    <div class="book-info">
                        <h3>어린왕자</h3>
                        <p>앙투안 드 생텍쥐페리</p>
                        <div style="margin-top: 15px; font-size: 12px; color: #ccc;">대화 기록 없음</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen" id="s3">
            <header>
                <div class="back-btn" onclick="goTo('s2')">􀄪</div>
                <h1 id="active-book-title">대화 중</h1>
                <div style="width: 24px;"></div>
            </header>
            <div class="chat-scroll-area" id="chat-engine">
                </div>
            <div class="input-wrapper">
                <input type="text" id="userInput" class="main-input" placeholder="생각을 나누어주세요..." onkeypress="if(event.keyCode==13) processSend()">
                <div class="send-btn" onclick="processSend()">􀄵</div>
            </div>
        </div>

        <div class="screen" id="s4">
            <header><h1>생각 보관함</h1></header>
            <div class="card-container" id="archive-view">
                </div>
        </div>
    </div>

    <nav class="nav-tab" id="bottom-nav">
        <div class="tab-item active" onclick="goTo('s2', this)">
            <span class="tab-icon">􀎞</span><span>서재</span>
        </div>
        <div class="tab-item" onclick="goTo('s4', this)">
            <span class="tab-icon">􀈺</span><span>보관함</span>
        </div>
        <div class="tab-item" onclick="alert('설정 기능 준비 중입니다.')">
            <span class="tab-icon">􀍟</span><span>설정</span>
        </div>
    </nav>
</div>

<script>
    /* === CORE ENGINE === */
    const SERVER_URL = "https://bookfriend-server.onrender.com";
    let state = {
        currentBook: '',
        history: JSON.parse(localStorage.getItem('bf_history') || "[]")
    };

    function goTo(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if(el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        
        // 채팅창에서는 탭바 숨김
        document.getElementById('bottom-nav').style.display = (id === 's3') ? 'none' : 'flex';
        
        if(id === 's4') renderArchive();
    }

    function startReading(title, author) {
        state.currentBook = title;
        document.getElementById('active-book-title').innerText = title;
        document.getElementById('chat-engine').innerHTML = '';
        
        // 웰컴 메시지
        appendUIMessage('bot', `안녕하세요. '${title}'을 읽으며 가장 인상 깊었던 구절이나 장면이 있었나요?`);
        goTo('s3');
    }

    function appendUIMessage(role, text) {
        const chatArea = document.getElementById('chat-engine');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        const now = new Date();
        const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        msgDiv.innerHTML = `
            <div class="bubble">${text}</div>
            <div class="msg-info"><span>${role === 'bot' ? '책친구' : '나'}</span> • <span>${timeStr}</span></div>
        `;
        
        chatArea.appendChild(msgDiv);
        
        // iOS 스크롤 보정
        setTimeout(() => {
            chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
        }, 100);
    }

    async function processSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        appendUIMessage('user', text);
        input.value = '';

        // 로컬 자동 저장 (생각 보관함용)
        saveToLocal(text);

        try {
            const res = await fetch(`${SERVER_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, book: state.currentBook })
            });
            const data = await res.json();
            appendUIMessage('bot', data.reply);
        } catch(e) {
            appendUIMessage('bot', "지금은 서버에 닿지 않았지만, 남겨주신 생각은 제가 잘 보관해둘게요. 🤍");
        }
    }

    function saveToLocal(content) {
        const entry = {
            id: Date.now(),
            book: state.currentBook,
            text: content,
            date: new Date().toLocaleDateString()
        };
        state.history.unshift(entry);
        localStorage.setItem('bf_history', JSON.stringify(state.history.slice(0, 100)));
    }

    function renderArchive() {
        const view = document.getElementById('archive-view');
        if(state.history.length === 0) {
            view.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">아직 저장된 생각이 없습니다.</div>';
            return;
        }
        
        view.innerHTML = state.history.map(item => `
            <div class="book-card" style="flex-direction:column; gap:8px;">
                <div style="font-size:12px; color:var(--bg); font-weight:700;">${item.book}</div>
                <div style="font-size:15px; color:var(--dk);">${item.text}</div>
                <div style="font-size:10px; color:#bbb; margin-top:5px;">${item.date}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
