<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>책친구</title>

<style>
:root{
  --bg:#F4EFE8;
  --main:#D8B384;
  --dark:#2F1B0F;
}

body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:linear-gradient(#F4EFE8,#EAD8BC);
  overflow:hidden;
}

/* 화면 */
.screen{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
  animation:fade .5s;
}
.screen.active{display:flex;}

@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}

/* 헤더 */
.header{
  padding:20px;
  font-weight:700;
}

/* 본문 */
.body{
  flex:1;
  overflow:auto;
  padding:20px;
}

/* 카드 */
.card{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* 캐릭터 */
.character{
  text-align:center;
  font-size:50px;
  margin-top:20px;
  animation:float 2s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

/* 채팅 */
.chat{
  flex:1;
  overflow:auto;
  padding:20px;
  padding-bottom:140px;
}

.msg{
  margin-bottom:10px;
  max-width:75%;
}

.bot{
  background:white;
  padding:12px;
  border-radius:14px;
}

.user{
  background:var(--main);
  color:white;
  padding:12px;
  border-radius:14px;
  margin-left:auto;
}

/* 입력 */
.inputbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:var(--bg);
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

.send{
  background:var(--main);
  color:white;
  padding:12px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- 감정 -->
<div id="s1" class="screen active">
  <div class="header">오늘 마음은 어떤 색이야?</div>

  <div class="character">📖✨</div>

  <div class="body">
    <div class="card" onclick="pickEmotion('불안')">🌫 불안</div>
    <div class="card" onclick="pickEmotion('외로움')">🌙 외로움</div>
    <div class="card" onclick="pickEmotion('지침')">🍂 지침</div>
  </div>
</div>

<!-- 공감 -->
<div id="s2" class="screen">
  <div class="header">책친구가 전하는 말</div>

  <div class="character">📖🤍</div>

  <div class="body">
    <div id="empathy"></div>
    <button onclick="goBooks()">책을 펼쳐볼까?</button>
  </div>
</div>

<!-- 책 -->
<div id="s3" class="screen">
  <div class="header">오늘의 책</div>
  <div class="body" id="bookList"></div>
</div>

<!-- 문장 -->
<div id="s4" class="screen">
  <div class="header">책의 한마디</div>
  <div class="body">
    <div id="quoteBox"></div>
    <button onclick="goChat()">이야기 나누기</button>
  </div>
</div>

<!-- 채팅 -->
<div id="s5" class="screen">
  <div class="header">책친구</div>
  <div class="chat" id="chat"></div>

  <div class="inputbar">
    <input id="input">
    <div class="send" onclick="send()">↑</div>
  </div>
</div>

<script>

/* 감정 공감 문장 */
const EMPATHY = {
  불안:'괜찮아, 지금 흔들리는 건 자연스러운 일이야.',
  외로움:'혼자라고 느껴지는 순간도, 사실은 지나가는 과정이야.',
  지침:'많이 애썼구나, 잠시 쉬어도 괜찮아.'
};

/* 책 데이터 */
const BOOKS = [
  {title:'데미안', quote:'새는 알을 깨고 나온다.'},
  {title:'어린왕자', quote:'가장 중요한 건 눈에 보이지 않아.'}
];

let emotion='';
let selectedBook=null;

/* 화면 */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* 감정 선택 */
function pickEmotion(e){
  emotion=e;
  document.getElementById('empathy').innerText=EMPATHY[e];
  show('s2');
}

/* 책 */
function goBooks(){
  renderBooks();
  show('s3');
}

function renderBooks(){
  const el=document.getElementById('bookList');
  el.innerHTML='';

  BOOKS.forEach(b=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerText=b.title;
    div.onclick=()=>selectBook(b);
    el.appendChild(div);
  });
}

/* 선택 */
function selectBook(b){
  selectedBook=b;

  document.getElementById('quoteBox').innerHTML=`
    <h2>${b.title}</h2>
    <p>${b.quote}</p>
  `;

  show('s4');
}

/* 채팅 */
function goChat(){
  show('s5');

  bot(`"${selectedBook.quote}"`);
  bot('이 문장이 지금 너에게 어떤 의미로 느껴져?');
}

function append(type,text){
  const chat=document.getElementById('chat');

  const div=document.createElement('div');
  div.className='msg '+type;
  div.innerText=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function bot(t){append('bot',t);}
function user(t){append('user',t);}

function send(){
  const input=document.getElementById('input');
  const msg=input.value;
  if(!msg) return;

  user(msg);
  input.value='';

  setTimeout(()=>{
    bot('그 감정을 조금 더 들려줄래?');
  },400);
}

</script>

</body>
</html>
