<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책친구</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#F5EFE6;
}

/* 화면 */
.screen{
  display:none;
  height:100vh;
  padding:20px;
}
.screen.active{
  display:block;
}

/* 채팅 */
#chat{
  height:70vh;
  overflow-y:auto;
  padding:10px;
  background:#fff;
  border-radius:12px;
}

.cmsg{
  margin:10px 0;
}
.cmsg.user{text-align:right;}

.cbubble{
  display:inline-block;
  padding:10px 14px;
  border-radius:14px;
  background:#eee;
}
.cmsg.user .cbubble{
  background:#D4A96A;
  color:white;
}

.ctime{
  font-size:10px;
  opacity:0.5;
}

/* 입력 */
.inputbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:10px;
  background:#fff;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#D4A96A;
  color:white;
}
</style>
</head>

<body>

<!-- 화면1 -->
<div id="s1" class="screen active">
  <h2>책친구</h2>
  <button onclick="next()">시작</button>
</div>

<!-- 화면2 -->
<div id="s2" class="screen">
  <h2>오늘 기분은?</h2>
  <button onclick="quickEmotion('슬픔')">슬픔</button>
  <button onclick="quickEmotion('불안')">불안</button>
  <button onclick="quickEmotion('기쁨')">기쁨</button>
</div>

<!-- 화면8 (채팅) -->
<div id="s8" class="screen">
  <h2>대화</h2>

  <div id="chat"></div>

  <div class="inputbar">
    <input id="chatInput" placeholder="입력...">
    <button id="sendBtn">전송</button>
  </div>
</div>

<!-- 화면11 (완료) -->
<div id="s11" class="screen">
  <h2>정리 완료</h2>
  <p>보관함에 저장됨</p>
</div>

<!-- 화면22 (중간 이동용) -->
<div id="s22" class="screen">
  <h2>로딩...</h2>
</div>

<!-- JS (너가 만든 코드 그대로) -->
<script>
const SERVER_URL = 'https://bookfriend-server.onrender.com';

let c = 1;
const TOTAL = 26;
let chatTurn = 0;
const MAX_CHAT_TURN = 10;
let savedThought = '';

function goTo(n){
  if(n < 1 || n > TOTAL || n === c) return;

  const current = document.getElementById('s' + c);
  const next = document.getElementById('s' + n);

  if(current) current.classList.remove('active');
  if(next){
    next.classList.add('active');
    c = n;
  }

  if(n === 22){
    setTimeout(()=>{ if(c===22) goTo(8); }, 1000);
  }
}

function next(){ goTo(c+1); }

function quickEmotion(emotion){
  localStorage.setItem('bookfriend_emotion', emotion);
  goTo(22);
}

function nowTime(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes();
}

function appendMsg(text,type){
  const chat=document.getElementById('chat');

  const div=document.createElement('div');
  div.className='cmsg '+type;

  div.innerHTML=`
    <div class="cbubble">${text}</div>
    <div class="ctime">${nowTime()}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function saveThought(){
  const record={
    id:Date.now(),
    thought:savedThought
  };
  const arr=JSON.parse(localStorage.getItem('bookfriend_thoughts')||'[]');
  arr.unshift(record);
  localStorage.setItem('bookfriend_thoughts',JSON.stringify(arr));
}

function finishChat(){
  saveThought();
  appendMsg("정리 완료!",'bot');
  setTimeout(()=>goTo(11),1500);
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg) return;

  appendMsg(msg,'user');
  savedThought+=msg+"\n";
  input.value='';

  chatTurn++;

  if(chatTurn>=MAX_CHAT_TURN){
    finishChat();
    return;
  }

  try{
    const res=await fetch(SERVER_URL+'/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });

    const data=await res.json();
    const reply=data.reply||"음...";
    appendMsg(reply,'bot');
    savedThought+=reply+"\n";

  }catch(e){
    appendMsg("그게 왜 마음에 걸려?",'bot');
  }
}

document.getElementById('sendBtn').onclick=sendMessage;

document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') sendMessage();
});
</script>

</body>
</html>
