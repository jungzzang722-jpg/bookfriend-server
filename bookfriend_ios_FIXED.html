<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>책친구 FINAL</title>

<style>
:root{
  --bg:#F2EDEA;
  --main:#C4A07C;
  --dark:#3E2010;
  --light:#E0CEB8;
  --sab:env(safe-area-inset-bottom);
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
}

.screen{
  display:none;
  height:100vh;
}

.screen.active{
  display:flex;
  flex-direction:column;
}

/* 버튼 */
.btn{
  background:var(--main);
  border:none;
  padding:16px;
  border-radius:14px;
  color:white;
  font-weight:600;
}

/* 감정 카드 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:20px;
}

.card{
  background:var(--light);
  padding:20px;
  border-radius:16px;
  cursor:pointer;
}

.card.sel{
  background:var(--main);
  color:white;
}

/* 책 리스트 */
.book{
  padding:16px;
  margin:10px;
  background:white;
  border-radius:12px;
  cursor:pointer;
}

/* 채팅 */
.chat{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  margin-bottom:12px;
}

.bot{color:#333}
.user{text-align:right}

/* 입력 */
.inputbar{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  padding-bottom:calc(var(--sab) + 10px);
  background:white;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
}
</style>
</head>

<body>

<!-- S1 인보딩 -->
<div class="screen active" id="s1">
  <div style="margin:auto;text-align:center">
    <h1>📖 책친구</h1>
    <p>감정에 맞는 한 줄의 책</p>
    <button class="btn" onclick="go(2)">시작하기</button>
  </div>
</div>

<!-- S2 감정 -->
<div class="screen" id="s2">
  <h2 style="padding:20px">오늘 기분은?</h2>
  <div class="grid">
    <div class="card" onclick="pick('찜찜')">🐣 찜찜</div>
    <div class="card" onclick="pick('지침')">🫣 지침</div>
    <div class="card" onclick="pick('말못함')">💬 말못함</div>
    <div class="card" onclick="pick('피곤')">😪 피곤</div>
  </div>
</div>

<!-- S3 책 리스트 -->
<div class="screen" id="s3">
  <h2 style="padding:20px">추천 책</h2>
  <div id="books"></div>
</div>

<!-- S4 편지 -->
<div class="screen" id="s4">
  <div style="padding:20px">
    <h3 id="bookTitle"></h3>
    <p id="quote" style="font-size:18px;margin-top:20px"></p>

    <button class="btn" onclick="startChat()">대화하기</button>
  </div>
</div>

<!-- S5 채팅 -->
<div class="screen" id="s5">
  <div class="chat" id="chat"></div>

  <div class="inputbar">
    <input id="input">
    <button onclick="send()">↑</button>
  </div>
</div>

<script>

/* 상태 */
let emotion='';
let book='';
let quote='';

/* 책 DB (확장 가능) */
const DB={
  찜찜:[
    {t:"아몬드",q:"세상은 나 없이도 잘 돌아갔다."},
    {t:"데미안",q:"새는 알을 깨고 나온다."}
  ],
  지침:[
    {t:"어린왕자",q:"가장 중요한 것은 보이지 않는다."}
  ],
  말못함:[
    {t:"82년생 김지영",q:"우리는 말하지 않은 것들로 가득하다."}
  ],
  피곤:[
    {t:"모모",q:"시간은 생명이다."}
  ]
};

/* 화면 이동 */
function go(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

/* 감정 선택 */
function pick(e){
  emotion=e;
  renderBooks();
  go(3);
}

/* 책 렌더링 */
function renderBooks(){
  const wrap=document.getElementById('books');
  wrap.innerHTML='';

  DB[emotion].forEach(b=>{
    const div=document.createElement('div');
    div.className='book';
    div.innerHTML=`<b>${b.t}</b><br>${b.q}`;

    div.onclick=()=>{
      book=b.t;
      quote=b.q;
      document.getElementById('bookTitle').innerText=book;
      document.getElementById('quote').innerText=quote;
      go(4);
    }

    wrap.appendChild(div);
  });
}

/* 채팅 시작 */
function startChat(){
  go(5);
  const chat=document.getElementById('chat');

  chat.innerHTML+=`
  <div class="msg bot">"${quote}"</div>
  <div class="msg bot">이 문장에서 어떤 느낌 들었어?</div>
  `;
}

/* 메시지 */
function send(){
  const input=document.getElementById('input');
  const chat=document.getElementById('chat');

  chat.innerHTML+=`<div class="msg user">${input.value}</div>`;
  input.value='';

  setTimeout(()=>{
    chat.innerHTML+=`<div class="msg bot">그 느낌, 조금 더 말해줄래?</div>`;
    chat.scrollTop=chat.scrollHeight;
  },500);
}

</script>

</body>
</html>
