<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책친구</title>

<style>
body{
  margin:0;
  font-family:'Pretendard', sans-serif;
  background:#F5EFE6;
}

/* 앱 구조 */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 온보딩 */
.onboarding{
  position:fixed;
  inset:0;
  background:#7B4F2E;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.onboarding h1{margin-bottom:10px;}
.onboarding button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
}

/* 헤더 */
.header{
  padding:14px;
  background:#D4A96A;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
}

/* 캐릭터 */
.character{
  width:36px;
  height:36px;
  border-radius:8px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* 채팅 */
.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  padding-bottom:120px;
}

.msg{margin-bottom:10px;}
.user{text-align:right;}
.bot{text-align:left;}

.bubble{
  display:inline-block;
  padding:12px;
  border-radius:16px;
  max-width:70%;
}

.user .bubble{background:#D4A96A;color:#fff;}
.bot .bubble{background:#fff;color:#333;}

/* 책 카드 */
.quote-card{
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.book{font-size:12px;color:#999;}
.quote{margin-top:6px;}

/* 감정 선택 */
.emotions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:16px;
}

.emotions button{
  padding:12px;
  border:none;
  border-radius:12px;
}

/* 입력 */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  padding:10px;
  gap:6px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  background:#7B4F2E;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* 보관함 */
.archive{
  position:fixed;
  right:10px;
  top:60px;
  background:#fff;
  padding:10px;
  border-radius:12px;
  max-height:300px;
  overflow:auto;
  display:none;
}
</style>
</head>

<body>

<div class="onboarding" id="onboarding">
  <h1>📖 책친구</h1>
  <p>오늘의 나에게, 책이 먼저 말을 건넵니다</p>
  <button onclick="startApp()">시작하기</button>
</div>

<div class="app">

<div class="header">
  <div class="character">📖</div>
  책친구
  <button onclick="toggleArchive()">보관함</button>
</div>

<div class="chat" id="chat"></div>

<div class="emotions" id="emotionBox">
  <button onclick="start('불안')">불안</button>
  <button onclick="start('외로움')">외로움</button>
  <button onclick="start('후회')">후회</button>
  <button onclick="start('자존감')">자존감</button>
  <button onclick="start('미래')">미래</button>
  <button onclick="start('관계')">관계</button>
</div>

<div class="footer">
  <input id="input" placeholder="생각을 적어보세요">
  <button onclick="send()">전송</button>
</div>

<div class="archive" id="archive"></div>

</div>

<script>

/* ===== 데이터 (확장형) ===== */
const QUOTES = {
  불안:[], 외로움:[], 후회:[], 자존감:[], 미래:[], 관계:[]
};

/* 🔥 200개 자동 생성 */
const baseBooks = ["어린왕자","데미안","월든","노인과 바다","죄와 벌","파우스트","변신","위대한 개츠비"];

for(let i=0;i<200;i++){
  const emoKeys = Object.keys(QUOTES);
  const emo = emoKeys[i % emoKeys.length];

  QUOTES[emo].push({
    book: baseBooks[i % baseBooks.length],
    text: "삶은 계속된다. " + (i+1)
  });
}

/* ===== 시작 ===== */
function startApp(){
  document.getElementById('onboarding').style.display='none';
}

/* ===== 감정 시작 ===== */
let currentEmotion = '';

function start(emotion){
  currentEmotion = emotion;
  document.getElementById('emotionBox').style.display='none';
  showQuote();
}

/* ===== 책 문장 ===== */
function showQuote(){
  const list = QUOTES[currentEmotion];
  const pick = list[Math.floor(Math.random()*list.length)];

  const chat = document.getElementById('chat');

  const div = document.createElement('div');
  div.className='quote-card';
  div.innerHTML=`
    <div class="book">${pick.book}</div>
    <div class="quote">"${pick.text}"</div>
  `;
  chat.appendChild(div);
  scroll();

  setTimeout(()=>{
    bot("이 문장에서 지금 가장 마음에 걸리는 부분은 어디야?");
  },600);
}

/* ===== 메시지 ===== */
function user(msg){
  chat.innerHTML += `<div class="msg user"><div class="bubble">${msg}</div></div>`;
  scroll();
}

function bot(msg){
  chat.innerHTML += `<div class="msg bot"><div class="bubble">${msg}</div></div>`;
  scroll();
}

/* ===== 전송 ===== */
let turn = 0;
let memory = [];

function send(){
  const input = document.getElementById('input');
  const val = input.value.trim();
  if(!val) return;

  user(val);
  memory.push(val);
  input.value='';
  turn++;

  if(turn > 5){
    finish();
    return;
  }

  setTimeout(()=>{
    const questions = [
      "그 감정이 생긴 이유는 뭐라고 생각해?",
      "그때 네가 진짜 하고 싶었던 말은?",
      "다시 돌아간다면 다르게 할 수 있을까?",
      "그 감정이 지금도 남아있는 이유는?",
      "한 문장으로 정리해본다면?"
    ];
    bot(questions[turn-1]);
  },600);
}

/* ===== 저장 ===== */
function finish(){
  const data = {
    date: new Date().toLocaleString(),
    emotion: currentEmotion,
    thought: memory.join("\n")
  };

  const arr = JSON.parse(localStorage.getItem('archive')||'[]');
  arr.unshift(data);
  localStorage.setItem('archive', JSON.stringify(arr));

  bot("오늘의 생각을 보관함에 저장했어 🤍");
}

/* ===== 보관함 ===== */
function toggleArchive(){
  const el = document.getElementById('archive');
  el.style.display = el.style.display==='block'?'none':'block';

  const data = JSON.parse(localStorage.getItem('archive')||'[]');

  el.innerHTML = data.map(d=>
    `<div style="margin-bottom:10px;">
      <b>${d.emotion}</b><br>${d.thought}
    </div>`
  ).join('');
}

/* ===== 스크롤 ===== */
function scroll(){
  setTimeout(()=>{
    chat.scrollTop = chat.scrollHeight;
  },50);
}

</script>

</body>
</html>
